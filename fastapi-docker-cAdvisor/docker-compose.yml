services:
  web:
    image: alexmahone/fastappi-crud-api:v0.0.2
    container_name: fastappi-crud-api
    restart: always
    ports:
      - 8000:8000

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - 8080:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
